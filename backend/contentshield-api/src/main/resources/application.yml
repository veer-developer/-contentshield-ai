spring:
  application:
    name: contentshield-api

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/contentshield}
    username: ${SPRING_DATASOURCE_USERNAME:cs_user}
    password: ${SPRING_DATASOURCE_PASSWORD:cs_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: 6379

  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: contentshield-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

server:
  port: 8080

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-4o
  max-tokens: 2000
  temperature: 0.3

python-service:
  url: ${PYTHON_SERVICE_URL:http://localhost:8001}

contentshield:
  authenticity:
    score-threshold: 70
    rejection-threshold: 40
  localization:
    drift-threshold: 20
  swarm:
    probability-alert: 0.5
    probability-escalate: 0.7
  human-review:
    timeout-hours: 24
